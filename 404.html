<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Benchmark Engineering Co. Ltd</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0B1F3A;
      --navy-deep: #071528;
      --gold: #C9A84C;
      --white: #ffffff;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }
    html, body {
      height: 100%;
      background: var(--navy-deep);
      font-family: var(--font-sans);
      color: var(--white);
    }
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(201,168,76,0.07) 0%, transparent 65%),
        var(--navy-deep);
    }
    .logo-mark {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: .14em;
      color: var(--gold);
      margin-bottom: 48px;
    }
    .logo-sub {
      display: block;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
    }
    .rule {
      width: 40px;
      height: 2px;
      background: var(--gold);
      border: none;
      opacity: 0.4;
      margin: 0 auto 40px;
    }
    .error-code {
      font-family: var(--font-serif);
      font-size: clamp(72px, 15vw, 120px);
      font-weight: 700;
      color: rgba(201,168,76,0.15);
      line-height: 1;
      margin-bottom: 8px;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(22px, 4vw, 32px);
      font-weight: 600;
      color: var(--white);
      margin-bottom: 16px;
    }
    p {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 40px;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--gold);
      color: var(--navy-deep);
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: .04em;
      transition: background 0.2s;
    }
    .btn-home:hover { background: #b8943e; }
    .footer-note {
      margin-top: 60px;
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      letter-spacing: .05em;
    }
  </style>
</head>
<body>
<div class="page-404">

  <div class="logo-mark">
    BENCHMARK
    <span class="logo-sub">Engineering Co. Ltd</span>
  </div>

  <hr class="rule" />

  <p class="error-code">404</p>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Return to the homepage to find what you need.</p>

  <a href="/" class="btn-home">← Return to Homepage</a>

  <p class="footer-note">BENCHMARK ENGINEERING CO. LTD · ZANZIBAR</p>
</div>
</body>
</html>
